name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (ruff + basedpyright + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: basedpyright
        run: basedpyright

      - name: pytest
        run: pytest app/tests/ -v

  frontend:
    name: frontend (next lint + next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Next lint
        run: npm run lint

      - name: Next build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build

  compose-lint:
    name: compose-lint (5432 loopback-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert postgres port 5432 is loopback-bound
        run: |
          set -e
          BAD=$(grep -E '5432:5432' docker-compose.yml | grep -vE '127\.0\.0\.1:5432:5432' || true)
          if [ -n "$BAD" ]; then
            echo "ERROR: docker-compose.yml has a non-loopback 5432 binding:"
            echo "$BAD"
            echo "Required form: \"127.0.0.1:5432:5432\""
            echo "See: prompts/2026-04-19-2045-harden-postgres-port-binding.md"
            exit 1
          fi
          echo "ok: 5432 binding is loopback-only"
